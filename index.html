<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>일정관리</title>
    <style>
        :root { --bg-color: #f4f5f7; --column-bg: #ebecf0; --card-bg: #ffffff; --text-color: #172b4d; --primary-color: #0052cc; --warning-color: #ff5630; --d1-color: #ff9f43; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 5px; }
        header { text-align: center; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        header h1 { margin: 5px 0; font-size: 1.2rem; color: var(--primary-color); }
        .btn-team { background: #6b778c; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
        .month-group-header { font-size: 0.75rem; background: #dfe1e6; padding: 6px; margin-top: 5px; cursor: pointer; border-radius: 3px; display: flex; justify-content: space-between; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 15% auto; padding: 15px; width: 85%; border-radius: 8px; max-height: 70vh; overflow-y: auto; }
        .clickable { cursor: pointer; color: var(--primary-color); text-decoration: underline; font-weight: bold; }
        .badge-d1 { background: var(--d1-color); color: white; padding: 2px 5px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; margin-right: 5px; }
        .team-item { display: flex; gap: 5px; margin-bottom: 8px; align-items: center; }
        .team-item input { flex: 1; padding: 5px; font-size: 0.8rem; }
        .team-item button { padding: 5px 8px; font-size: 0.7rem; cursor: pointer; border: none; border-radius: 3px; }
        .dashboard-container { display: flex; flex-direction: column; gap: 8px; max-width: 1200px; margin: 0 auto 10px auto; }
        .panel { background: #fff; border-radius: 6px; padding: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.12); }
        .summary-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 5px; }
        .summary-table { width: 100%; border-collapse: collapse; font-size: 0.65rem; text-align: center; }
        .summary-table th, .summary-table td { border: 1px solid #eee; padding: 3px; }
        .calendar-day-cell { border: 1px solid #eee; border-radius: 2px; height: 40px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 2px; font-size: 0.6rem; }
        .task-badge { font-size: 0.55rem; background: var(--primary-color); color: white; border-radius: 10px; padding: 0 4px; margin-top: 2px; cursor: pointer; }
        .board { display: flex; flex-direction: column; gap: 8px; max-width: 1200px; margin: 0 auto; }
        .column { background-color: var(--column-bg); flex: 1; border-radius: 6px; padding: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.12); }
        .column h2 { font-size: 0.9rem; margin: 0 0 5px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .add-card-form { margin-bottom: 8px; display: flex; flex-direction: column; gap: 4px; }
        .add-card-form textarea { width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; padding: 5px; height: 40px; font-size: 0.8rem; }
        .form-row { display: flex; gap: 3px; }
        .form-row input, .form-row select { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 4px; font-size: 0.7rem; }
        .form-row button { background: var(--primary-color); color: white; border: none; padding: 0 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .card { background-color: var(--card-bg); border-radius: 4px; padding: 8px; margin-bottom: 5px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .card-actions { display: flex; justify-content: flex-end; gap: 4px; margin-top: 5px; }
        .card-actions button { background: #e0e0e0; border: none; border-radius: 3px; padding: 3px 6px; cursor: pointer; font-size: 0.65rem; color: #333; }
        @media (min-width: 768px) { .dashboard-container { flex-direction: row; } .board { flex-direction: row; align-items: flex-start; } }
    </style>
</head>
<body>
    <div id="team-modal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><h3>👥 팀원 관리</h3><div id="team-list"></div><div class="form-row"><input type="text" id="new-member-name" placeholder="새 팀원 이름"><button onclick="addTeamMember()">추가</button></div></div></div>
    <div id="task-modal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><h3 id="modal-title">작업 상세</h3><div id="modal-list"></div><button onclick="document.getElementById('task-modal').style.display='none'" style="width:100%; margin-top:10px; padding:8px;">닫기</button></div></div>
    
    <header><h1>📱 일정관리 </h1><button class="btn-team" onclick="document.getElementById('team-modal').style.display='block'">팀 관리</button></header>
    
    <div class="dashboard-container">
        <div class="panel" style="flex:1;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button onclick="changeMonth(-1)">◀</button><h4 id="calendar-title" style="margin:0; font-size:0.8rem;">년 월</h4><button onclick="changeMonth(1)">▶</button>
            </div>
            <div id="calendar-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:1px; text-align:center; font-size:0.6rem; margin-top:5px;"></div>
        </div>
        <div class="panel" style="flex:2;">
            <div class="summary-wrapper">
                <div><h4 style="margin:0 0 3px 0; font-size:0.75rem;">👤 담당자</h4><table class="summary-table" id="assignee-table"><thead><tr><th>이름</th><th>할일</th><th>진행</th><th>완료</th></tr></thead><tbody></tbody></table></div>
                <div><h4 style="margin:0 0 3px 0; font-size:0.75rem;">📅 마감일</h4><table class="summary-table" id="date-table"><thead><tr><th>날짜</th><th>대기</th><th>완료</th></tr></thead><tbody></tbody></table></div>
                <div><h4 style="margin:0 0 3px 0; font-size:0.75rem; color:var(--warning-color);">⚠️ 마감</h4><table class="summary-table" id="overdue-table"><thead><tr><th>작업</th><th>일자</th></tr></thead><tbody></tbody></table></div>
            </div>
        </div>
    </div>

    <div class="board">
        <div class="column" id="col-todo"><h2 onclick="toggleColumn('todo')">할 일 <span id="todo-count">0</span></h2>
            <div class="add-card-form"><textarea id="todo-input" placeholder="새 작업..."></textarea><div class="form-row"><input type="date" id="todo-start"><input type="date" id="todo-due"></div><div class="form-row"><select id="todo-assignee"><option value="">담당자</option></select><select id="todo-repeat"><option value="none">반복X</option><option value="daily">매일</option><option value="weekly">매주</option><option value="monthly">매월</option></select><button onclick="addCard('todo')">등록</button></div></div>
            <div id="todo-list"></div>
        </div>
        <div class="column" id="col-inprogress"><h2 onclick="toggleColumn('inprogress')">진행 중 <span id="inprogress-count">0</span></h2>
            <div class="add-card-form"><textarea id="inprogress-input" placeholder="새 작업..."></textarea><div class="form-row"><input type="date" id="inprogress-start"><input type="date" id="inprogress-due"></div><div class="form-row"><select id="inprogress-assignee"><option value="">담당자</option></select><select id="inprogress-repeat"><option value="none">반복X</option><option value="daily">매일</option><option value="weekly">매주</option><option value="monthly">매월</option></select><button onclick="addCard('inprogress')">등록</button></div></div>
            <div id="inprogress-list"></div>
        </div>
        <div class="column" id="col-done"><h2 onclick="toggleColumn('done')">완료 <span id="done-count">0</span></h2>
            <div class="add-card-form"><textarea id="done-input" placeholder="새 작업..."></textarea><div class="form-row"><input type="date" id="done-start"><input type="date" id="done-due"></div><div class="form-row"><select id="done-assignee"><option value="">담당자</option></select><select id="done-repeat"><option value="none">반복X</option><option value="daily">매일</option><option value="weekly">매주</option><option value="monthly">매월</option></select><button onclick="addCard('done')">등록</button></div></div>
            <div id="done-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDSERFM9_UmjfPt5x3HTsL0flekVb-p6HA",
            authDomain: "project-5a01b.firebaseapp.com",
            projectId: "project-5a01b",
            storageBucket: "project-5a01b.firebasestorage.app",
            messagingSenderId: "16464029460",
            appId: "1:16464029460:web:f8c68e90d1a1e4204c8401"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        
        let currentTasks = [], teamMembers = [], currentDate = new Date();
        let hasShownAlert = false;

        // 🟢 [보안 개선 및 기능 확장] GAS 프록시를 거쳐 알림을 전송하는 통합 함수
        window.sendLineNotificationProxy = function(messageText) {
            // 💡 여기에 아까 복사해 두신 본인의 GAS 웹 앱 URL을 입력해 주세요!
            const gasUrl = "https://script.google.com/macros/s/AKfycbyXn99LNYF-MgSEylL3PmcIgt0UaapVhiHXeexHfJCLHIGl5jj4nNRwwoSw0v5u-OgnJA/exec"; 

            if (gasUrl === "https://script.google.com/macros/s/AKfycbyXn99LNYF-MgSEylL3PmcIgt0UaapVhiHXeexHfJCLHIGl5jj4nNRwwoSw0v5u-OgnJA/exec") {
                console.warn("GAS 웹 앱 URL이 설정되지 않아 알림을 전송하지 않습니다.");
                return;
            }

            fetch(gasUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain'
                },
                body: JSON.stringify({
                    messages: [{ type: "text", text: messageText }]
                })
            })
            .then(response => console.log('GAS 프록시 알림 전달 성공'))
            .catch(error => console.error('GAS 프록시 알림 에러:', error));
        };
        
        window.toggleColumn = (id) => { const list = document.getElementById(`${id}-list`); list.style.display = list.style.display === 'none' ? 'block' : 'none'; };
        window.toggleMonth = (id) => {
            const el = document.getElementById(id);
            const header = el.previousElementSibling;
            if (el.style.display === 'none') { el.style.display = 'block'; header.querySelector('.arrow').innerText = '▲'; }
            else { el.style.display = 'none'; header.querySelector('.arrow').innerText = '▼'; }
        };
        window.addTeamMember = async () => { const name = document.getElementById('new-member-name').value; if(!name) return; await addDoc(collection(db, "team"), { name }); document.getElementById('new-member-name').value = ''; };
        window.deleteTeamMember = async (id) => { if(confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "team", id)); };
        window.renameMember = async (id, newName) => { await updateDoc(doc(db, "team", id), { name: newName }); alert("변경 완료"); };
        
        // 🌟 할 일 등록 시 알림 연동
        window.addCard = async (col) => { 
            const input = document.getElementById(`${col}-input`); 
            const text = input.value; 
            if(!text) return; 
            input.value = ''; 
            
            const startDate = document.getElementById(`${col}-start`).value;
            const dueDate = document.getElementById(`${col}-due`).value;
            const assignee = document.getElementById(`${col}-assignee`).value;
            const repeat = document.getElementById(`${col}-repeat`).value;

            await addDoc(collection(db, "tasks"), { 
                text, 
                status: col, 
                startDate: startDate, 
                dueDate: dueDate, 
                assignee: assignee, 
                repeat: repeat, 
                createdAt: Date.now() 
            }); 

            // 안전한 GAS 프록시 알림 호출
            const msg = `🟢 [새로운 일정 등록]\n• 내용: ${text}\n• 담당자: ${assignee || '미지정'}\n• 마감일: ${dueDate || '미지정'}`;
            window.sendLineNotificationProxy(msg);
        };
        
        // 🌟 상태 수정(이동) 시 알림 연동
        window.moveTask = async (id, newStatus) => { 
            try {
                // 변경 전 데이터 가져오기 (메시지에 내용 표시용)
                const taskSnap = await getDoc(doc(db, "tasks", id));
                if (taskSnap.exists()) {
                    const taskData = taskSnap.data();
                    const statusNames = { 'todo': '할 일', 'inprogress': '진행 중', 'done': '완료' };
                    
                    await updateDoc(doc(db, "tasks", id), { status: newStatus }); 
                    document.getElementById('task-modal').style.display = 'none'; 

                    // 상태 변경 알림 호출
                    const msg = `📝 [일정 상태 변경]\n• 작업: ${taskData.text}\n• 담당: ${taskData.assignee || '미지정'}\n• 변경: [${statusNames[taskData.status] || taskData.status}] ➔ [${statusNames[newStatus]}]`;
                    window.sendLineNotificationProxy(msg);
                }
            } catch (e) {
                console.error("이동 알림 전송 에러:", e);
            }
        };
        
        // 🌟 일정 삭제 시 알림 연동
        window.deleteTask = async (id) => { 
            if(confirm("이 작업을 정말 삭제하시겠습니까?")) {
                try {
                    // 삭제 전 데이터 백업
                    const taskSnap = await getDoc(doc(db, "tasks", id));
                    if (taskSnap.exists()) {
                        const taskData = taskSnap.data();
                        
                        await deleteDoc(doc(db, "tasks", id)); 

                        // 삭제 완료 알림 호출
                        const msg = `🗑️ [일정 삭제 알림]\n• 삭제된 작업: ${taskData.text}\n• 담당이었던 분: ${taskData.assignee || '미지정'}`;
                        window.sendLineNotificationProxy(msg);
                    }
                } catch(e) {
                    console.error("삭제 알림 전송 에러:", e);
                }
            }
        };

        window.changeAssignee = async (id, newAssignee) => {
            await updateDoc(doc(db, "tasks", id), { assignee: newAssignee });
            // 담당자 직접 변경 시에도 원하시면 여기에 알림을 추가할 수 있습니다.
        };

        window.changeMonth = (o) => { currentDate.setMonth(currentDate.getMonth() + o); renderCalendar(); };
        window.showPopup = (type, value, status) => {
            const modal = document.getElementById('task-modal');
            const list = document.getElementById('modal-list');
            const title = document.getElementById('modal-title');
            let filtered = currentTasks.filter(t => (type==='assignee'?t.assignee===value&&(status?t.status===status:true):(type==='date'||type==='d1'||type==='overdue'?t.dueDate===value&&t.status!=='done':t.id===value)));
            title.innerText = type === 'd1' ? '⚠️ 내일 마감 예정' : (type === 'assignee' ? `${value} 님의 작업` : '상세');
            list.innerHTML = filtered.length > 0 ? filtered.map(t => `<div class="card"><strong>${t.text||''}</strong><br><small>${t.startDate||''}~${t.dueDate||''} | ${t.assignee||''}</small></div>`).join('') : '<p>작업 없음</p>';
            modal.style.display = 'block';
        };

        onSnapshot(query(collection(db, "team")), (s) => { teamMembers = s.docs.map(d => ({ id: d.id, name: d.data().name })); renderTeamModal(); updateUI(); });
        onSnapshot(query(collection(db, "tasks"), orderBy("createdAt", "desc")), (s) => { 
            currentTasks = s.docs.map(d => ({ id: d.id, ...d.data() })); 
            updateUI(); 
            if (!hasShownAlert) {
                const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
                if (currentTasks.some(t => t.dueDate === tomorrow && t.status !== 'done')) { window.showPopup('d1', tomorrow); hasShownAlert = true; }
            }
        });

        function renderTeamModal() {
            const list = document.getElementById('team-list');
            if(!list) return;
            list.innerHTML = teamMembers.map(m => `<div class="team-item"><input type="text" id="in-${m.id}" value="${m.name}"><button onclick="renameMember('${m.id}', document.getElementById('in-${m.id}').value)">변경</button><button style="background:var(--warning-color); color:white;" onclick="deleteTeamMember('${m.id}')">삭제</button></div>`).join('');
        }

        function updateUI() {
            const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
            ['todo', 'inprogress', 'done'].forEach(col => {
                const select = document.getElementById(`${col}-assignee`);
                if(select) select.innerHTML = '<option value="">담당자</option>' + teamMembers.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
                
                const listContainer = document.getElementById(`${col}-list`);
                if(!listContainer) return;
                listContainer.innerHTML = '';
                
                const tasks = currentTasks.filter(t => t.status === col).sort((a,b) => (b.dueDate||'').localeCompare(a.dueDate||''));
                const countEl = document.getElementById(`${col}-count`);
                if(countEl) countEl.innerText = tasks.length;

                const groups = {};
                tasks.forEach(t => {
                    const month = t.dueDate ? t.dueDate.substring(0, 7) : '미지정';
                    if(!groups[month]) groups[month] = [];
                    groups[month].push(t);
                });

                Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(month => {
                    const gid = `${col}-${month}`;
                    const groupDiv = document.createElement('div');
                    groupDiv.innerHTML = `<div class="month-group-header" onclick="toggleMonth('${gid}')">${month} (${groups[month].length}건) <span class="arrow">▲</span></div><div id="${gid}"></div>`;
                    listContainer.appendChild(groupDiv);
                    
                    const cardList = groupDiv.querySelector(`#${gid}`);
                    groups[month].forEach(t => {
                        const div = document.createElement('div'); div.className = 'card';
                        const dateStr = (t.startDate || t.dueDate) ? `<div style="font-size:0.6rem; color:#666;">${t.dueDate? '마감:'+t.dueDate.slice(5):''}</div>` : '';
                        
                        let optionsHtml = '<option value="">담당자 미지정</option>';
                        teamMembers.forEach(m => {
                            const isSelected = t.assignee === m.name ? 'selected' : '';
                            optionsHtml += '<option value="' + m.name + '" ' + isSelected + '>' + m.name + '</option>';
                        });
                        const assigneeSelect = '<select onchange="changeAssignee(\'' + t.id + '\', this.value)" style="font-size:0.65rem; margin-top:3px; padding:2px; border:1px solid #ccc; border-radius:3px; width:100%; max-width:120px;">' + optionsHtml + '</select>';

                        div.innerHTML = `<p style="margin:0;">${t.text||''}</p>${dateStr}<div>${assigneeSelect}</div><div class="card-actions">${col!=='todo'?`<button onclick="moveTask('${t.id}','todo')">할일</button>`:''}${col!=='inprogress'?`<button onclick="moveTask('${t.id}','inprogress')">진행</button>`:''}${col!=='done'?`<button onclick="moveTask('${t.id}','done')">완료</button>`:''}<button style="background:var(--warning-color); color:white;" onclick="deleteTask('${t.id}')">삭제</button></div>`;
                        
                        cardList.appendChild(div);
                    });
                });
            });
            
            try { renderStats(); } catch(e) { console.error("집계 렌더링 에러:", e); }
            try { renderCalendar(); } catch(e) { console.error("달력 렌더링 에러:", e); }
        }
        
        function renderStats() {
             const aTbody = document.querySelector('#assignee-table tbody'); 
             const dTbody = document.querySelector('#date-table tbody'); 
             const oTbody = document.querySelector('#overdue-table tbody');
             if(!aTbody || !dTbody || !oTbody) return;
             aTbody.innerHTML = ''; dTbody.innerHTML = ''; oTbody.innerHTML = '';
             const today = new Date().toISOString().split('T')[0];
             const aMap = {}, dMap = {};
             currentTasks.forEach(t => {
                 const n = t.assignee || '미지정'; 
                 if(!aMap[n]) aMap[n] = {todo:0, inprogress:0, done:0}; 
                 if(t.status && aMap[n][t.status] !== undefined) aMap[n][t.status]++;
                 
                 if(t.dueDate) { 
                     if(!dMap[t.dueDate]) dMap[t.dueDate] = {pending:0, done:0}; 
                     t.status === 'done' ? dMap[t.dueDate].done++ : dMap[t.dueDate].pending++; 
                     if(t.dueDate < today && t.status !== 'done') {
                         const safeText = t.text ? t.text.substring(0,6) : '내용없음';
                         oTbody.innerHTML += `<tr onclick="showPopup('overdue', '${t.dueDate}')"><td class="clickable">${safeText}..</td><td>${t.dueDate.slice(5)}</td></tr>`;
                     }
                 }
             });
             for(let n in aMap) aTbody.innerHTML += `<tr><td>${n}</td><td class="clickable" onclick="showPopup('assignee','${n}','todo')">${aMap[n].todo}</td><td class="clickable" onclick="showPopup('assignee','${n}','inprogress')">${aMap[n].inprogress}</td><td class="clickable" onclick="showPopup('assignee','${n}','done')">${aMap[n].done}</td></tr>`;
             for(let d in dMap) dTbody.innerHTML += `<tr><td>${d.slice(5)}</td><td class="clickable" onclick="showPopup('date','${d}')">${dMap[d].pending}</td><td class="clickable" onclick="showPopup('date','${d}')">${dMap[d].done}</td></tr>`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            if(!grid) return;
            grid.innerHTML = '일월화수목금토'.split('').map(d => `<div style="font-weight:bold;">${d}</div>`).join('');
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            document.getElementById('calendar-title').innerText = `${y}년 ${m + 1}월`;
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
            for (let i = 0; i < first; i++) grid.appendChild(document.createElement('div'));
            for (let i = 1; i <= last; i++) {
                const dStr = `${y}-${(m + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
                const count = currentTasks.filter(t => t.dueDate && t.dueDate === dStr).length;
                const div = document.createElement('div'); div.className = 'calendar-day-cell';
                div.innerHTML = `<div>${i}</div>` + (count > 0 ? `<div class="task-badge" onclick="showPopup('date', '${dStr}')">${count}</div>` : '');
                grid.appendChild(div);
            }
        }
    </script>
</body>
</html>
